{% extends "base.html" %}

{% block title %}Reset Password - GrandStay{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="auth-container">
        <div class="text-center mb-4">
            <div class="fs-1 text-success mb-2"><i class="fas fa-lock-open"></i></div>
            <h4 class="fw-bold mb-1">Reset Password</h4>
            <p class="text-muted small">Enter the 6-digit OTP sent to <strong>{{ email }}</strong> and set a new password.</p>
        </div>
        
        <form action="{{ url_for('reset_password') }}" method="POST">
            <div class="mb-3">
                <label for="otp" class="form-label small fw-bold">Verification OTP</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                    <input type="text" class="form-control text-center fw-bold" id="otp" name="otp" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="new_password" class="form-label small fw-bold">New Security Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Min 6 characters" minlength="6" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 py-2.5">
                Update Password & Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
