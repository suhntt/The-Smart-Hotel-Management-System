{% extends "base.html" %}

{% block title %}Forgot Password - GrandStay{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="auth-container">
        <div class="text-center mb-4">
            <div class="fs-1 text-warning mb-2"><i class="fas fa-key"></i></div>
            <h4 class="fw-bold mb-1">Forgot Password</h4>
            <p class="text-muted small">Enter your email and we'll send you an OTP to reset your security credentials.</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-4">
                <label for="email" class="form-label small fw-bold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@domain.com" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 py-2.5">
                Send Reset OTP
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
